<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小野人排班系統 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>小野人餐盒製造所</h1>
            <div class="subtitle">新版排班管理系統</div>
        </header>

        <section class="search-bar">
            <input type="text" id="nameFilter" placeholder="搜尋姓名 (例：小金)..." oninput="filterSchedule()">
            <div id="week-display" class="week-label">載入中...</div>
        </section>

        <section class="schedule-container">
            <div id="schedule-list">
                <p class="msg">正在讀取最新班表...</p>
            </div>
        </section>

        <div id="off-form-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>排班/排休申請</h3>
                
                <label>員工姓名</label>
                <select id="offName">
                    <option value="">請選擇您的姓名</option>
                    <option value="寀菁">寀菁</option>
                    <option value="玲玲">玲玲</option>
                    <option value="妏妏">妏妏</option>
                    <option value="子怡">子怡</option>
                    <option value="小金">小金</option>
                </select>

                <label>選擇時段 (或申請休假)</label>
                <select id="offTime">
                    <option value="9:00~14:00">1. 9:00~14:00</option>
                    <option value="9:00~20:00(空班4hr)">2. 9:00~20:00 (空班4小時)</option>
                    <option value="16:00~20:00">3. 16:00~20:00</option>
                    <option value="個人排休">個人排休 (不排班)</option>
                </select>
                
                <label>選擇日期</label>
                <input type="date" id="offDate">
                
                <label>備註 (選填)</label>
                <textarea id="offNote" placeholder="例如：診所看診..." rows="2"></textarea>
                
                <div class="modal-btns">
                    <button id="submitBtn" onclick="submitOffRequest()">送出申請</button>
                    <button class="cancel-btn" onclick="toggleModal(false)">取消</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <button id="btn-thisweek" class="active" onclick="showThisWeek()">本週班表</button>
            <button id="btn-all" onclick="showAll()">顯示全部</button>
            <button onclick="toggleModal(true)">申請排休</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
