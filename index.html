<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小野人排班系統 4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: #2c3e50; margin-bottom:5px;">小野人餐盒</h2>
            <p style="margin-bottom:25px; color: #7f8c8d;">夥伴登入系統</p>
            <select id="loginName">
                <option value="">選擇您的名字</option>
                <option value="寀菁">寀菁</option>
                <option value="妏妏">妏妏</option>
                <option value="子怡">子怡</option>
                <option value="小金">小金</option>
            </select>
            <input type="password" id="loginPin" placeholder="請輸入 4 位密碼" inputmode="numeric">
            <button id="loginBtn" onclick="login()">進入系統</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee;">
            <span id="user-welcome" style="font-weight: bold; font-size: 1.1em;">載入中...</span>
            <button onclick="location.reload()" style="background:none; border:1px solid #ccc; font-size:12px; padding:5px 10px; border-radius:5px;">登出</button>
        </header>

        <section class="schedule-container" style="padding-bottom: 80px;">
            <div id="schedule-list"></div>
        </section>

        <div id="off-form-modal" class="modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;">
            <div class="modal-content" style="background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px;">
                <h3 style="margin-top: 0;">申請排休</h3>
                <label>選擇日期 (可選多個)：</label>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="date" id="offDateInput" style="flex: 1; height: 40px; border: 1px solid #ddd; border-radius: 5px;">
                    <button onclick="addDateToList()" style="width:50px; height:40px; background:#3498db; color: white; border: none; border-radius: 5px;">+</button>
                </div>
                <div id="selected-dates-container" style="min-height: 30px; margin-bottom: 10px;"></div>
                <label>備註 (原因)：</label>
                <textarea id="offNote" placeholder="例如：家裡有事" style="width: 100%; height: 60px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box;"></textarea>
                <div class="modal-btns" style="display: flex; gap: 10px;">
                    <button onclick="toggleModal(false)" style="flex: 1; height: 45px; background:#95a5a6; color: white; border: none; border-radius: 8px;">取消</button>
                    <button onclick="submitMultipleOffRequests()" style="flex: 1; height: 45px; background:#e74c3c; color: white; border: none; border-radius: 8px;">送出申請</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: white; border-top: 1px solid #eee; display: flex; align-items: center;">
            <button onclick="showToday()" class="active" style="flex: 1; background: none; border: none; font-weight: bold; height: 100%;">看今日</button>
            <button onclick="toggleModal(true)" style="flex: 1; background:#e74c3c; color:white; border: none; font-weight: bold; height: 100%;">我要排休</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
