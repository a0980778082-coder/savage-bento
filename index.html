<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>小野人夥伴系統 8.0</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section id="login">
  <div class="panel">
    <div class="badge">SAVAGE MEAL BOX</div>
    <h1>小野人餐盒</h1><p>夥伴專屬系統</p>
    <select id="name"><option value="">選擇您的名字</option></select>
    <input id="pin" type="password" inputmode="numeric" placeholder="輸入密碼">
    <button id="loginBtn" onclick="login()">登入系統</button>
    <div id="msg"></div>
  </div>
</section>

<section id="app" class="hidden">
  <header><div><b id="title">載入中</b><small id="sub"></small></div><button class="outline" onclick="location.reload()">登出</button></header>
  <div id="filter" class="hidden"><label>月份</label><select id="month" onchange="applyFilter()"></select></div>
  <main id="list"></main>
  <nav>
    <button data-tab="today" onclick="showToday()">今日班表</button>
    <button data-tab="all" onclick="showAll()">全店總表</button>
    <button data-tab="off" onclick="showMyOff()">我的申請</button>
    <button data-tab="apply" class="red" onclick="showApply()">我要排休</button>
  </nav>
</section>
<div id="toast" class="hidden"></div>
<script src="script.js?v=8.0"></script>
</body>
</html>
